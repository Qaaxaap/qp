name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout lfspkg
        uses: actions/checkout@v4
        with:
          repository: Qaaxaap/lfspkg
          path: lfspkg

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake g++ make gettext

      - name: Bootstrap lfspkg
        run: |
          cd lfspkg
          autoreconf -i
          ./configure
          make

      - name: Bootstrap
        run: autoreconf -i

      - name: Configure
        run: ./configure --with-lfspkg="$GITHUB_WORKSPACE/lfspkg"

      - name: Build
        run: make

      - name: Test
        run: make check

      - name: Distcheck
        run: make distcheck DISTCHECK_CONFIGURE_FLAGS="--with-lfspkg=$GITHUB_WORKSPACE/lfspkg"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout lfspkg
        uses: actions/checkout@v4
        with:
          repository: Qaaxaap/lfspkg
          path: lfspkg

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake g++ make gettext

      - name: Bootstrap lfspkg
        run: |
          cd lfspkg
          autoreconf -i
          ./configure
          make

      - name: Create distribution tarball
        run: |
          autoreconf -i
          ./configure --with-lfspkg="$GITHUB_WORKSPACE/lfspkg"
          make dist

      - name: Upload tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: qp-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
